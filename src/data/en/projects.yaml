# To add a project, just append an entry to this list.
# - image: path under public/ (e.g. "/images/my-project.png"). Leave empty for the default placeholder.
# - lien: repo or demo URL. Leave empty to auto-build from PUBLIC_GITHUB_URL/<slug>.
# - nom: add a trailing "!" (e.g. "Chocolatine!") to feature the project on the homepage.
#   The "!" is stripped from the display.
# - tags: "Category:Value" format (e.g. "Languages:Python"). A trailing "!" on the value
#   (e.g. "Languages:Python!") features that skill on the homepage. These tags also feed
#   the Skills section, computed automatically from these plus the experience entries
#   (src/data/en/profile.yaml). Categories used: Languages, Tools, Methodologies, Domains.

- slug: "chocolatine"
  nom: "Chocolatine!"
  description_courte: "A type-safe SQL query builder for Python, no string concatenation."
  description: >
    A Python library for building complex SQL queries programmatically, with
    full IDE autocompletion and runtime type checking. Supports joins,
    subqueries, CTEs (including recursive ones), window functions,
    aggregations and set operations (UNION/INTERSECT/EXCEPT), without ever
    resorting to string concatenation. Published on PyPI, 99% test coverage.
  tags: ["Languages:Python", "Languages:SQL", "Domains:Query Builder", "Tools:PyPI", "Methodologies:Testing"]
  image: "/images/logo-chocolatine.jpg"
  lien: ""

- slug: "pitchoune"
  nom: "Pitchoune!"
  description_courte: "A Python library on top of Polars to load/save data and chat with LLMs."
  description: >
    A wrapper around Polars for loading and saving data (xlsx, csv, tsv,
    jsonl) in normal or streaming mode, with column-by-column injection into
    decorated functions and recovery on failure. Also includes an LLM chat
    integration, locally via Ollama or through the OpenAI API.
  tags: ["Languages:Python", "Tools:Polars", "Domains:Data", "Tools:LLM", "Tools:Ollama"]
  image: "/images/logo-pitchoune.jpeg"
  lien: ""

- slug: "legitifier"
  nom: "Legitifier!"
  description_courte: "A CLI tool to assess the credibility of GitHub repositories (fake stars, misleading claims)."
  description: >
    A command-line tool that evaluates the credibility of a GitHub
    repository, particularly in the AI/ML space where inflated claims are
    common. Checks social signals (star patterns, fork ratios), repository
    metadata, code quality (secrets, tests, documentation) and history
    (dormancy, Telegram funnels). Each check is a standalone YAML-defined
    heuristic, easy to audit or extend. Supports LLM-based analysis (OpenAI,
    Anthropic, or local Ollama).
  tags: ["Languages:Python", "Tools:CLI", "Domains:Security", "Methodologies:Open Source", "Tools:LLM"]
  image: "/images/logo-legitifier.jpeg"
  lien: ""

- slug: "agentic-ai-playground"
  nom: "Agentic AI Playground!"
  description_courte: "A Docker Compose stack for a fully local AI agent (LangGraph, MCP, vLLM)."
  description: >
    A Docker Compose stack to run an AI agent entirely locally: Open WebUI
    as the interface, a LangGraph agent for orchestration, skill and context
    management services (RAG via Qdrant), an MCP client that spawns MCP
    servers on demand (filesystem, git, playwright, a custom terminal
    server), all served by vLLM. Each service has its own isolated test
    suite, with no dependency on real third-party services.
  tags: ["Tools:Docker!", "Tools:LangGraph", "Domains:AI Agents", "Tools:MCP", "Tools:vLLM", "Methodologies:RAG"]
  image: "/images/logo-agentic-ai-playground.jpg"
  lien: ""

