- slug: "risc-v-32-edu"
  nom: "RISC-V 32 Edu!"
  description_courte: "An educational 32-bit RISC-V processor simulator, from NAND gates to out-of-order execution."
  description: >
    An educational simulator of a 32-bit RISC-V processor (RV32I), built
    from NAND logic gates up to out-of-order execution (Tomasulo's
    algorithm) with a full memory hierarchy. Offers several execution modes:
    sequential CPU, 5-stage pipeline with forwarding and branch prediction,
    and superscalar out-of-order execution (Reservation Stations, Reorder
    Buffer, Register Alias Table, Common Data Bus). Configurable memory
    hierarchy with L1/L2 caches and prefetching.
  tags: ["Languages:Python", "Domains:RISC-V", "Methodologies:Architecture", "Methodologies:Simulation", "Domains:Education"]
  image: "/images/logo-risc-v-32-edu.jpg"
  lien: ""

