- slug: "risc-v-32-edu"
  nom: "RISC-V 32 Edu!"
  description_courte: "Simulateur pédagogique d'un processeur RISC-V 32 bits, du NAND à l'out-of-order."
  description: >
    Simulateur pédagogique d'un processeur RISC-V 32 bits (RV32I), construit
    depuis les portes logiques NAND jusqu'à l'exécution out-of-order
    (algorithme de Tomasulo) avec hiérarchie mémoire complète. Propose
    plusieurs modes d'exécution : CPU séquentiel, pipeline 5 étages avec
    forwarding et prédiction de branchement, et exécution out-of-order
    superscalaire (Reservation Stations, Reorder Buffer, Register Alias
    Table, Common Data Bus). Hiérarchie mémoire configurable avec caches
    L1/L2 et prefetching.
  tags: ["Langages:Python", "Domaines:RISC-V", "Méthodologies:Architecture", "Méthodologies:Simulation", "Domaines:Éducatif"]
  image: ""
  lien: ""

