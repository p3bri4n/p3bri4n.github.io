  tags: ["Langages:Python", "Outils:Polars", "Domaines:Data", "Outils:LLM", "Outils:Ollama"]
  image: ""
  lien: ""

- slug: "legitifier"
  nom: "Legitifier"
  description_courte: "Outil CLI pour évaluer la crédibilité de dépôts GitHub (fake stars, claims trompeurs)."
  description: >
    Outil en ligne de commande qui évalue la crédibilité d'un dépôt GitHub,
    en particulier dans le domaine IA/ML où les affirmations exagérées sont
    fréquentes. Analyse les signaux sociaux (patterns de stars, ratio de forks),
    les métadonnées du dépôt, la qualité du code (secrets, tests, documentation)
    et l'historique (dormance, funnels Telegram). Chaque vérification est une
    heuristique définie en YAML, facile à auditer ou étendre. Supporte
    l'analyse par LLM (OpenAI, Anthropic ou Ollama en local).
  tags: ["Langages:Python", "Outils:CLI", "Domaines:Sécurité", "Méthodologies:Open Source", "Outils:LLM"]
  image: ""
  lien: ""

- slug: "agentic-ai-playground"
  nom: "Agentic AI Playground!"
  description_courte: "Stack Docker Compose pour un agent IA local (LangGraph, MCP, vLLM)."
  description: >
    Stack Docker Compose pour faire tourner un agent IA entièrement en local :
    Open WebUI comme interface, un agent LangGraph pour l'orchestration, des
    services de gestion de skills et de contexte (RAG via Qdrant), un client MCP
    qui démarre à la demande des serveurs MCP (filesystem, git, playwright,
    terminal maison), le tout servi par vLLM. Chaque service a sa propre suite
    de tests isolée, sans dépendance à de vrais services tiers.
  tags: ["Outils:Docker!", "Outils:LangGraph", "Domaines:Agents IA", "Outils:MCP", "Outils:vLLM", "Méthodologies:RAG"]
  image: ""
  lien: ""

