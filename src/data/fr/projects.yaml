# Pour ajouter un projet, il suffit d'ajouter une entrée à cette liste.
# - image : chemin dans public/ (ex: "/images/mon-projet.png"). Laisser vide pour le placeholder par défaut.
# - lien : URL du dépôt ou de la démo. Laisser vide pour utiliser automatiquement PUBLIC_GITHUB_URL/<slug>.
# - nom : ajouter un "!" à la fin (ex: "Chocolatine!") pour mettre le projet en avant sur
#   l'accueil. Le "!" est retiré à l'affichage.
# - tags : format "Catégorie:Valeur" (ex: "Langages:Python"). Un "!" en fin de valeur
#   (ex: "Langages:Python!") met la compétence en avant sur l'accueil. Ces tags
#   alimentent aussi la section Compétences, calculée automatiquement à partir de
#   ceux-ci et de ceux du parcours (src/data/fr/profile.yaml). Catégories utilisées :
#   Langages, Outils, Méthodologies, Domaines.

- slug: "chocolatine"
  nom: "Chocolatine!"
  description_courte: "Query builder SQL en Python, typé et sans concaténation de chaînes."
  description: >
    Bibliothèque Python permettant de construire des requêtes SQL complexes de
    façon programmatique, avec autocomplétion IDE complète et vérification de
    type à l'exécution. Gère notamment les jointures, sous-requêtes, CTE
    (y compris récursives), fonctions fenêtrées, agrégations et opérations
    ensemblistes (UNION/INTERSECT/EXCEPT), sans jamais passer par de la
    concaténation de chaînes. Publiée sur PyPI, couverte à 99% par les tests.
  tags: ["Langages:Python", "Langages:SQL", "Domaines:Query Builder", "Outils:PyPI", "Méthodologies:Tests"]
  image: ""
  lien: ""

- slug: "pitchoune"
  nom: "Pitchoune"
  description_courte: "Bibliothèque Python (Polars) pour charger/sauvegarder des données et dialoguer avec des LLM."
  description: >
    Surcouche à Polars pour charger et sauvegarder des données (xlsx, csv, tsv,
