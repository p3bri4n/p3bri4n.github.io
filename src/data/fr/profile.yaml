objectifs:
  - "Continuer à réaliser une veille technologique soutenue pour être au fait des dernières innovations & mettre en avant les plus prometteuses à travers mon blog."
  - "Garantir la soutenabilité des projets sur lesquels j'évolue, notamment à travers une emphase forte sur la frugalité (financière et à portée écologique), et la sécurité / confidentialité des données (hello RGPD)."
  - "Mettre l'humain en avant en promouvant ce qui nous distingue des machines, la capacité à ressentir, créer, faire des choix conscients assumés. L'IA n'est qu'un outil destiné à nous améliorer à travers notre humanité, et je l'espère nous reconnecter."
