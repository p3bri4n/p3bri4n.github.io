  Ingénieur IA, 10 ans d'expérience dont 4 sur des systèmes NLP/LLM en production.
  Après plusieurs années en mission (Airbus, Safran, CVG Medical, KPAM) à concevoir et industrialiser des pipelines IA de bout en bout, je cherche à m'inscrire dans la durée au sein d'un grand groupe pour porter des projets IA de leur conception à leur exploitation.
